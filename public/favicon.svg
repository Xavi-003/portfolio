<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#0a0514" />
      <stop offset="100%" stopColor="#1a0b2e" />
    </linearGradient>

    <!-- Neon Stroke Gradient -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#7c3aed" /> <!-- violet -->
      <stop offset="50%" stopColor="#d946ef" /> <!-- glow -->
      <stop offset="100%" stopColor="#e879f9" /> <!-- fuchsia -->
    </linearGradient>

    <!-- Outer Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)" />

  <!-- Outer Hexagon Track -->
  <polygon
    points="50 12, 83 31, 83 69, 50 88, 17 69, 17 31"
    fill="none"
    stroke="rgba(124, 58, 237, 0.2)"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Main Glowing Hexagon -->
  <polygon
    points="50 12, 83 31, 83 69, 50 88, 17 69, 17 31"
    fill="none"
    stroke="url(#neon)"
    stroke-width="4"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Web Dev Code Bracket Symbol < /> -->
  <!-- Left Bracket < -->
  <path d="M 38 40 L 28 50 L 38 60" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Right Bracket > -->
  <path d="M 62 40 L 72 50 L 62 60" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Slash / -->
  <path d="M 55 35 L 45 65" fill="none" stroke="#e879f9" stroke-width="5" stroke-linecap="round" filter="url(#glow)" />

  <!-- Bottom Accent Dot -->
  <circle cx="50" cy="78" r="3" fill="#ffffff" filter="url(#glow)" />
</svg>
